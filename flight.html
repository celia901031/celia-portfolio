<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taipei → London</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Space+Mono&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f7f7f7;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    canvas { display: block; max-width: 100%; max-height: 100vh; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const W = 1200, H = 620;
canvas.width  = W;
canvas.height = H;

const BG       = '#f7f7f7';
const CRIMSON  = '#990021';
const C_FILL   = 'rgba(153,0,33,0.07)';
const C_STROKE = '#990021';
const GRID_CLR = 'rgba(153,0,33,0.055)';

// ── Equirectangular projection ─────────────────────────────────────────────
function proj(lon, lat) {
  return {
    x: (lon + 180) / 360 * W,
    y: (90  - lat)  / 180 * H
  };
}

// ── Continent polygons (lon, lat pairs) ────────────────────────────────────
const GEO = [
  // Greenland
  [[-44,60],[-36,60],[-28,64],[-22,68],[-18,72],[-20,78],
   [-28,82],[-36,84],[-44,82],[-52,78],[-56,74],[-60,70],[-58,66],[-52,62],[-44,60]],

  // North America
  [[-168,72],[-155,62],[-140,60],[-130,54],[-126,50],[-124,46],
   [-124,40],[-120,36],[-116,30],[-110,24],[-105,22],[-98,18],
   [-90,16],[-85,12],[-83,10],[-78,8],[-77,8],[-79,14],
   [-84,22],[-88,20],[-92,18],[-96,18],[-100,22],[-105,22],
   [-110,28],[-116,32],[-116,38],[-120,42],[-122,48],
   [-128,52],[-134,56],[-140,60],[-150,62],[-160,66],[-168,72]],

  // South America
  [[-80,10],[-74,10],[-64,10],[-58,8],[-52,4],[-46,2],
   [-42,-2],[-36,-8],[-36,-10],[-38,-16],[-40,-20],
   [-44,-22],[-48,-28],[-52,-32],[-52,-34],[-58,-38],
   [-60,-42],[-66,-46],[-66,-52],[-68,-56],[-64,-54],
   [-58,-52],[-54,-46],[-52,-40],[-50,-28],[-44,-24],
   [-42,-16],[-40,-10],[-36,-4],[-40,2],[-50,4],
   [-58,6],[-64,8],[-72,10],[-80,10]],

  // Europe (main)
  [[-10,36],[-8,38],[-8,44],[-2,44],[2,44],[6,44],
   [10,44],[14,44],[18,40],[20,38],[24,36],[30,36],[36,36],
   [36,40],[32,44],[28,46],[24,50],[22,52],[20,54],
   [14,56],[12,58],[6,58],[8,62],[14,66],[16,70],
   [8,70],[0,64],[-4,62],[-6,58],[-6,52],[0,50],
   [2,50],[0,46],[-4,44],[-8,44],[-10,38],[-10,36]],

  // UK & Ireland
  [[-6,50],[-4,50],[-2,50],[0,50],[2,51],[2,52],
   [0,52],[-2,52],[-4,54],[-3,56],[-4,58],
   [-6,58],[-6,56],[-4,54],[-4,52],[-6,50]],

  // Africa
  [[-6,36],[4,36],[10,36],[20,36],[30,32],[36,22],
   [40,16],[42,12],[44,10],[44,8],[42,4],[40,-2],
   [36,-10],[34,-16],[30,-24],[28,-30],[18,-34],[14,-34],
   [16,-30],[14,-22],[10,-16],[6,-10],[2,-4],[0,2],
   [-4,6],[-8,10],[-16,10],[-18,14],[-16,20],
   [-8,26],[-4,30],[-6,36]],

  // Asia main
  [[26,38],[32,36],[38,36],[44,36],[50,38],[56,42],
   [62,44],[68,44],[74,42],[80,44],[88,48],[96,52],
   [104,54],[112,54],[120,54],[128,50],[136,48],
   [140,50],[140,46],[136,40],[130,36],[126,30],
   [122,26],[118,22],[114,18],[110,16],[108,14],
   [104,12],[102,6],[104,2],[100,2],[100,6],[104,10],
   [104,14],[100,16],[98,18],[94,20],[90,24],[84,28],
   [80,28],[72,24],[68,22],[64,22],[60,22],[56,22],
   [52,26],[48,30],[44,32],[40,36],[36,38],[30,40],[26,38]],

  // Arabian Peninsula
  [[36,28],[42,16],[44,12],[48,12],[52,16],[56,22],
   [60,24],[56,24],[52,26],[48,28],[44,32],[40,34],[36,36],[36,28]],

  // Indian Subcontinent
  [[68,22],[72,22],[74,16],[76,14],[78,10],[80,8],
   [80,12],[78,16],[80,22],[84,24],[88,24],[92,22],
   [94,24],[88,28],[84,28],[80,28],[72,24],[68,22]],

  // SE Asia peninsula
  [[98,20],[100,14],[102,8],[104,6],[102,4],[100,4],
   [100,8],[104,12],[104,16],[102,18],[98,20]],

  // Taiwan (small)
  [[120,22],[122,22],[122,24],[120,26],[120,22]],

  // Japan
  [[130,32],[132,34],[134,36],[136,38],[138,40],
   [140,42],[138,44],[136,42],[134,38],[132,36],[130,34],[130,32]],

  // Australia
  [[114,-22],[118,-18],[122,-18],[126,-14],[130,-12],
   [136,-12],[138,-14],[140,-16],[142,-14],[146,-18],
   [150,-22],[152,-26],[152,-30],[150,-34],[148,-38],
   [144,-38],[140,-36],[136,-34],[130,-32],[122,-34],
   [116,-32],[114,-28],[114,-22]]
];

// ── City definitions ───────────────────────────────────────────────────────
const TAIPEI = proj(121.5, 25.0);
const LONDON = proj(-0.1, 51.5);

// Quadratic bezier control point (arcs north over Russia)
const CP = proj(68, 62);

function quadPoint(t, p0, cp, p1) {
  const m = 1 - t;
  return {
    x: m*m*p0.x + 2*m*t*cp.x + t*t*p1.x,
    y: m*m*p0.y + 2*m*t*cp.y + t*t*p1.y
  };
}

// ── Draw helpers ───────────────────────────────────────────────────────────
function drawGrid() {
  ctx.strokeStyle = GRID_CLR;
  ctx.lineWidth = 0.6;
  for (let lon = -180; lon <= 180; lon += 30) {
    const a = proj(lon, 85), b = proj(lon, -85);
    ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
  }
  for (let lat = -60; lat <= 90; lat += 30) {
    const a = proj(-180, lat), b = proj(180, lat);
    ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
  }
}

function drawContinents() {
  GEO.forEach(polygon => {
    if (polygon.length < 2) return;
    ctx.beginPath();
    const s = proj(polygon[0][0], polygon[0][1]);
    ctx.moveTo(s.x, s.y);
    polygon.slice(1).forEach(([lon, lat]) => {
      const p = proj(lon, lat);
      ctx.lineTo(p.x, p.y);
    });
    ctx.closePath();
    ctx.fillStyle   = C_FILL;
    ctx.fill();
    ctx.strokeStyle = C_STROKE;
    ctx.lineWidth   = 0.9;
    ctx.stroke();
  });
}

function drawPath(progress) {
  // Full ghost path
  ctx.save();
  ctx.setLineDash([5, 7]);
  ctx.strokeStyle = 'rgba(153,0,33,0.18)';
  ctx.lineWidth   = 1.5;
  ctx.beginPath();
  ctx.moveTo(TAIPEI.x, TAIPEI.y);
  ctx.quadraticCurveTo(CP.x, CP.y, LONDON.x, LONDON.y);
  ctx.stroke();
  ctx.setLineDash([]);

  // Flown portion
  if (progress > 0) {
    const steps = 100;
    ctx.strokeStyle = CRIMSON;
    ctx.lineWidth   = 2;
    ctx.beginPath();
    const s = quadPoint(0, TAIPEI, CP, LONDON);
    ctx.moveTo(s.x, s.y);
    const end = Math.floor(progress * steps);
    for (let i = 1; i <= end; i++) {
      const pt = quadPoint(i / steps, TAIPEI, CP, LONDON);
      ctx.lineTo(pt.x, pt.y);
    }
    ctx.stroke();

    // Glow trail (soft)
    ctx.save();
    ctx.globalAlpha = 0.08;
    ctx.strokeStyle = CRIMSON;
    ctx.lineWidth   = 8;
    ctx.beginPath();
    const gs = quadPoint(Math.max(0, progress - 0.12), TAIPEI, CP, LONDON);
    ctx.moveTo(gs.x, gs.y);
    for (let i = Math.floor(Math.max(0, progress-0.12)*steps); i <= end; i++) {
      const pt = quadPoint(i / steps, TAIPEI, CP, LONDON);
      ctx.lineTo(pt.x, pt.y);
    }
    ctx.stroke();
    ctx.restore();
  }
  ctx.restore();
}

function drawPlane(progress) {
  if (progress <= 0 || progress >= 1) return;
  const dt  = 0.008;
  const cur = quadPoint(progress, TAIPEI, CP, LONDON);
  const prv = quadPoint(Math.max(0, progress - dt), TAIPEI, CP, LONDON);
  const angle = Math.atan2(cur.y - prv.y, cur.x - prv.x);

  ctx.save();
  ctx.translate(cur.x, cur.y);
  ctx.rotate(angle);

  const S = 1.1;
  ctx.fillStyle = CRIMSON;

  // Fuselage
  ctx.beginPath();
  ctx.ellipse(0, 0, 18*S, 4*S, 0, 0, Math.PI*2);
  ctx.fill();

  // Main wings
  ctx.beginPath();
  ctx.moveTo(2*S, 0);
  ctx.lineTo(-5*S, -17*S);
  ctx.lineTo(-9*S, -17*S);
  ctx.lineTo(-4*S,  0);
  ctx.closePath();
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(2*S, 0);
  ctx.lineTo(-5*S,  17*S);
  ctx.lineTo(-9*S,  17*S);
  ctx.lineTo(-4*S,  0);
  ctx.closePath();
  ctx.fill();

  // Tail fin
  ctx.beginPath();
  ctx.moveTo(-14*S, 0);
  ctx.lineTo(-9*S,  -8*S);
  ctx.lineTo(-7*S,  -8*S);
  ctx.lineTo(-7*S,   0);
  ctx.closePath();
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(-14*S, 0);
  ctx.lineTo(-9*S,   8*S);
  ctx.lineTo(-7*S,   8*S);
  ctx.lineTo(-7*S,   0);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

function drawCityMarker(p, label, side) {
  // Pulsing ring
  ctx.beginPath();
  ctx.arc(p.x, p.y, 10, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(153,0,33,0.25)';
  ctx.lineWidth   = 1;
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(p.x, p.y, 4, 0, Math.PI*2);
  ctx.fillStyle = CRIMSON;
  ctx.fill();

  // Label
  ctx.font      = '700 12px "Barlow Condensed", sans-serif';
  ctx.fillStyle = CRIMSON;
  const off = side === 'right' ? 16 : -16;
  ctx.textAlign = side === 'right' ? 'left' : 'right';
  ctx.fillText(label, p.x + off, p.y - 8);
  ctx.textAlign = 'left';
}

function drawLoadingText(now) {
  const text   = 'LOADING';
  const cycle  = 900;                  // ms per full sweep
  const t      = (now % cycle) / cycle;
  const active = Math.floor(t * text.length);

  const cw = 22, padding = 16;
  const totalW = text.length * cw + padding * 2;
  const bx = W/2 - totalW/2;
  const by = 28;

  // Pill background
  ctx.fillStyle = 'rgba(153,0,33,0.06)';
  ctx.beginPath();
  ctx.roundRect(bx, by, totalW, 34, 6);
  ctx.fill();

  ctx.font = '900 20px "Barlow Condensed", sans-serif';
  for (let i = 0; i < text.length; i++) {
    const dist = Math.abs(i - active);
    const alpha = dist === 0 ? 1 : Math.max(0.18, 1 - dist * 0.28);
    ctx.fillStyle = `rgba(153,0,33,${alpha})`;
    ctx.textAlign = 'center';
    ctx.fillText(text[i], bx + padding + i * cw + cw/2, by + 24);
  }
  ctx.textAlign = 'left';
}

function drawProgressBar(progress) {
  const bx = 180, by = H - 38, bw = W - 360, bh = 2;

  // Track
  ctx.fillStyle = 'rgba(153,0,33,0.12)';
  ctx.fillRect(bx, by, bw, bh);

  // Filled
  ctx.fillStyle = CRIMSON;
  ctx.fillRect(bx, by, bw * progress, bh);

  // Plane dot on bar
  const px = bx + bw * progress;
  ctx.beginPath();
  ctx.arc(px, by + 1, 4, 0, Math.PI*2);
  ctx.fillStyle = CRIMSON;
  ctx.fill();

  // City labels
  ctx.fillStyle = CRIMSON;
  ctx.font = '700 13px "Barlow Condensed", sans-serif';

  ctx.textAlign = 'left';
  ctx.fillText('TAIPEI  ·  TPE', bx, by - 10);

  ctx.textAlign = 'right';
  ctx.fillText('LONDON  ·  LHR', bx + bw, by - 10);

  ctx.textAlign = 'left';
}

// ── Animation loop ─────────────────────────────────────────────────────────
const DURATION = 7000;   // ms for one flight
const PAUSE    = 1800;   // ms pause at destination
let   progress = 0;
let   lastTime = null;
let   pausing  = false;
let   pauseStart = 0;

function frame(now) {
  if (!lastTime) lastTime = now;

  if (pausing) {
    if (now - pauseStart > PAUSE) {
      pausing   = false;
      progress  = 0;
      lastTime  = now;
    }
  } else {
    progress += (now - lastTime) / DURATION;
    lastTime  = now;
    if (progress >= 1) {
      progress   = 1;
      pausing    = true;
      pauseStart = now;
    }
  }

  // ── Render ────────────────────────────────────────────────────────────────
  ctx.fillStyle = BG;
  ctx.fillRect(0, 0, W, H);

  drawGrid();
  drawContinents();
  drawPath(progress);
  drawCityMarker(TAIPEI, 'TAIPEI', 'right');
  drawCityMarker(LONDON, 'LONDON', 'left');
  drawPlane(progress);
  drawProgressBar(progress);

  if (progress < 1) drawLoadingText(now);
  else {
    // Arrived label
    ctx.font      = '900 16px "Barlow Condensed", sans-serif';
    ctx.fillStyle = CRIMSON;
    ctx.textAlign = 'center';
    ctx.fillText('ARRIVED', W/2, 46);
    ctx.textAlign = 'left';
  }

  requestAnimationFrame(frame);
}

requestAnimationFrame(frame);
</script>
</body>
</html>
